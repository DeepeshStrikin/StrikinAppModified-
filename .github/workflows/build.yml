name: Build Strikin app (web + APK)

# Builds in the cloud on every push to main (and on-demand from the Actions tab),
# so you never have to build on a low-memory laptop. After a run finishes, download
# the APK and the web build from the run's "Artifacts" section.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define=API_URL=https://web-production-c154d.up.railway.app --dart-define=WEB_URL=https://strikinappwebversion.netlify.app

      - name: Build Android APK
        run: flutter build apk --release --dart-define=API_URL=https://web-production-c154d.up.railway.app --dart-define=WEB_URL=https://strikinappwebversion.netlify.app

      - name: Upload APK (download & install on your phone)
        uses: actions/upload-artifact@v4
        with:
          name: strikin-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload web build (drag to Netlify)
        uses: actions/upload-artifact@v4
        with:
          name: strikin-web
          path: build/web
